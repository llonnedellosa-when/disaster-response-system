<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>DRES Polangui — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>

    <div class="shell">
      <div class="auth-card">
        <div class="logo-block">
          <span class="logo-icon"></span>
          <div class="logo-title">DRES <span>Polangui</span></div>
          <div class="logo-sub">
            Disaster Response & Emergency System · Albay
          </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('login')">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
          </button>
          <button class="tab-btn" onclick="switchTab('register')">
            <i class="fa-solid fa-person-circle-plus"></i>
            Register
          </button>
        </div>

        <!-- ALERT -->
        <div class="alert" id="authAlert"></div>

        <!-- LOGIN PANEL -->
        <div class="panel active" id="panel-login">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              class="form-input"
              id="loginEmail"
              type="email"
              placeholder="your@email.com"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="pw-wrap">
              <input
                class="form-input"
                id="loginPassword"
                type="password"
                placeholder="••••••••"
                onkeypress="if (event.key === 'Enter') doLogin();"
              />
              <button
                class="pw-eye"
                onclick="togglePw('loginPassword', this)"
                type="button"
              >
                <i class="fa-solid fa-eye-slash"></i>
              </button>
            </div>
          </div>
          <button class="submit-btn" id="loginBtn" onclick="doLogin()">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Mag-login / Login
          </button>
        </div>

        <!-- REGISTER PANEL -->
        <div class="panel" id="panel-register">
          <div class="form-group">
            <label class="form-label"
              >Full Name <span style="color: var(--primary)">*</span></label
            >
            <input
              class="form-input"
              id="regName"
              type="text"
              placeholder="Juan dela Cruz"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              >Email Address <span style="color: var(--primary)">*</span></label
            >
            <input
              class="form-input"
              id="regEmail"
              type="email"
              placeholder="your@email.com"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Barangay</label>
            <select class="form-select" id="regBarangay">
              <option value="">— Piliin ang inyong barangay —</option>
              <option>Agos</option>
              <option>Alnay</option>
              <option>Alomon</option>
              <option>Amoguis</option>
              <option>Anopol</option>
              <option>Apad</option>
              <option>Balaba</option>
              <option>Balangibang</option>
              <option>Basud</option>
              <option>Centro Occidental</option>
              <option>Centro Oriental</option>
              <option>Cotnogan</option>
              <option>Cotmon</option>
              <option>Danao</option>
              <option>Gabon</option>
              <option>Maysua</option>
              <option>Mendez</option>
              <option>Magurang</option>
              <option>Matacon</option>
              <option>Pintor</option>
              <option>Pinagdapugan</option>
              <option>Ponso</option>
              <optio>Quinale</optio>
              <option>San Roque</option>
              <option>Santicon</option>
              <option>Sugcad</option>
              <option>Salvacion</option>
              <option>Ubaliw</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label"
              >Password <span style="color: var(--primary)">*</span></label
            >
            <div class="pw-wrap">
              <input
                class="form-input"
                id="regPassword"
                type="password"
                placeholder="Min. 6 characters"
              />
              <button
                class="pw-eye"
                onclick="togglePw('regPassword', this)"
                type="button"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label"
              >Confirm Password
              <span style="color: var(--primary)">*</span></label
            >
            <div class="pw-wrap">
              <input
                class="form-input"
                id="regConfirm"
                type="password"
                placeholder="Repeat password"
                onkeypress="if (event.key === 'Enter') doRegister();"
              />
              <button
                class="pw-eye"
                onclick="togglePw('regConfirm', this)"
                type="button"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <button class="submit-btn" id="registerBtn" onclick="doRegister()">
            📝 Mag-register / Register
          </button>
        </div>

        <div class="divider">or</div>
        <div class="admin-link">
          MDRRMO Admin?
          <a href="/admin/dashboard.html">Admin Dashboard →</a>
        </div>

        <div class="auth-footer">
          DRES Polangui · Polangui, Albay · Disaster Response System
        </div>
      </div>
    </div>

    <script>
      const API = "";

      function switchTab(tab) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b, i) =>
            b.classList.toggle(
              "active",
              (i === 0 && tab === "login") || (i === 1 && tab === "register"),
            ),
          );
        document
          .getElementById("panel-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("panel-register")
          .classList.toggle("active", tab === "register");
        hideAlert();
      }

      function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector("i");
  if (inp.type === "password") {
    inp.type = "text";
    icon.className = "fa-solid fa-eye";
  } else {
    inp.type = "password";
    icon.className = "fa-solid fa-eye-slash";
  }
}

      function showAlert(msg, type = "error") {
        const el = document.getElementById("authAlert");
        el.innerHTML = msg;
        el.className = `alert show ${type}`;
      }
      function hideAlert() {
        document.getElementById("authAlert").className = "alert";
      }

      async function doLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) {
          showAlert( '<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Ilagay ang email at password.');
          return;
        }

        const btn = document.getElementById("loginBtn");
        btn.disabled = true;
        btn.textContent = '<i class="fa-solid fa-spinner fa-spin fa-spin-reverse" style="color: rgb(203, 226, 255);"></i> Logging in...';
        hideAlert();

        try {
          const res = await fetch(`${API}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            showAlert('<i class="fa-regular fa-circle-xmark" style="color: rgb(255, 7, 7);"></i>' + (data.detail || "Invalid email or password."));
            return;
          }

          const u = data.data;
          sessionStorage.setItem("user_id", u.user_id);
          sessionStorage.setItem("user_name", u.name);
          sessionStorage.setItem("user_email", u.email);
          sessionStorage.setItem("token", u.token);
          sessionStorage.setItem("role", u.role);

          showAlert(
            '<i class="fa-solid fa-circle-check" style="color: rgb(0, 214, 10);"></i> Welcome back, ' + u.name + "! Redirecting...",
            "success",
          );
          setTimeout(() => {
            window.location.href = "/resident/dashboard.html";
          }, 1200);
        } catch (e) {
          showAlert(
            "❌ Hindi ma-reach ang server. Siguraduhing tumatakbo ang backend.",
          );
        } finally {
          btn.disabled = false;
          btn.textContent = "🔑 Mag-login / Login";
        }
      }

      async function doRegister() {
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const barangay = document.getElementById("regBarangay").value;
        const password = document.getElementById("regPassword").value;
        const confirm = document.getElementById("regConfirm").value;

        if (!name) {
          showAlert('<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Ilagay ang inyong pangalan.');
          return;
        }
        if (!email) {
          showAlert('<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Ilagay ang email address.');
          return;
        }
        if (!password) {
          showAlert('<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Pumili ng password.');
          return;
        }
        if (password.length < 6) {
          showAlert('<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Password ay dapat 6 characters man lang.');
          return;
        }
        if (password !== confirm) {
          showAlert('<i class="fa-solid fa-circle-exclamation" style="color: rgb(255, 7, 7);"></i> Hindi magkapareho ang passwords.');
          return;
        }

        const btn = document.getElementById("registerBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Registering...";
        hideAlert();

        try {
          const res = await fetch(`${API}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password, barangay }),
          });
          const data = await res.json();

          if (!res.ok) {
            showAlert("❌ " + (data.detail || "Registration failed."));
            return;
          }

          showAlert('<i class="fa-solid fa-circle-check" style="color: rgb(0, 214, 10);"></i> Account created! Redirecting to login...', "success");
          setTimeout(() => {
            document.getElementById("regName").value = "";
            document.getElementById("regEmail").value = "";
            document.getElementById("regPassword").value = "";
            document.getElementById("regConfirm").value = "";
            switchTab("login");
            document.getElementById("loginEmail").value = email;
          }, 1500);
        } catch (e) {
          showAlert(
            "❌ Hindi ma-reach ang server. Siguraduhing tumatakbo ang backend.",
          );
        } finally {
          btn.disabled = false;
          btn.textContent = "📝 Mag-register / Register";
        }
      }
    </script>
  </body>
</html>
